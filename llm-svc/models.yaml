# models.yaml: Configuration for models served by llm-svc
#
# Format:
#   - name: model identifier
#     kind: embedding | reranker | generative
#     format: onnx | gguf | safetensors | cloud
#     path: local file path (empty for cloud models)
#     dims: embedding dimensionality (0 for non-embedding models)
#     version: model version
#     is_default: true if this is the default for its kind

models:
  # Default embedding model (used by Go backend via Embed RPC)
  - name: text-embedding-3-small
    kind: embedding
    format: cloud
    path: ""
    dims: 1536
    version: "1.0"
    is_default: true

  # Optional: local embedding model (ONNX format)
  # Uncomment and set path when deployed with local ONNX embedder
  # - name: e5-small-v2
  #   kind: embedding
  #   format: onnx
  #   path: /models/e5-small-v2.onnx
  #   dims: 384
  #   version: "1.0"
  #   is_default: false

  # Default reranker model (used by Go backend via Rerank RPC)
  - name: bge-reranker-base
    kind: reranker
    format: onnx
    path: /models/bge-reranker-base.onnx
    dims: 0
    version: "1.0"
    is_default: true

  # Optional: local generative model for modes 2/3 (GGUF format)
  # Uncomment when deploying with local Qwen model
  # - name: qwen3-8b-q4
  #   kind: generative
  #   format: gguf
  #   path: /models/qwen3-8b-q4.gguf
  #   dims: 0
  #   version: "1.0"
  #   is_default: true

  # Cloud-based generation model (proxy in llm-svc)
  - name: gpt-4o-mini
    kind: generative
    format: cloud
    path: ""
    dims: 0
    version: "1.0"
    is_default: true
