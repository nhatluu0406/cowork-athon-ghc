trigger: "User report: dist-app/win-unpacked/Cowork GHC.exe errors on run."
root_cause: >
  The packaged app never booted. Electron main is an esbuild CommonJS bundle, but app/shell/package.json
  declares "type": "module", so Electron loaded dist/main.js as ESM and its top-level require threw
  ReferenceError: require is not defined in ES module scope (main.js:1). The app showed a modal Error
  dialog and no window. The earlier "boot smoke STAYED_ALIVE" was a FALSE POSITIVE: a Windows GUI-subsystem
  binary detaches from the console (empty stderr always) and the process stayed alive only because the
  modal error dialog held it open. STAYED_ALIVE != window rendered.
fix:
  - "main-bundle.mjs / preload-bundle.mjs emit .cjs (dist/main.cjs, dist/preload.cjs) — CommonJS is unambiguous regardless of type:module."
  - "create-window.ts PRELOAD_PATH -> preload.cjs; app/shell/package.json main + start:electron -> ./dist/main.cjs; root package.json main -> app/shell/dist/main.cjs."
  - "electron-builder.yml: REMOVED extraMetadata.main (it rewrote the source root package.json in place, stripping scripts; the async --dir restore was unreliable). Entry now comes from root main -> no source mutation (verified: scripts survive packaging)."
  - "csp.ts + app/ui/index.html: dropped the invalid http://[::1]:*/ws://[::1]:* connect-src source (Chromium rejects it -> per-launch console error; service binds IPv4 127.0.0.1 only)."
  - "Medium-1 (review): added files glob !app/shell/dist/**/*.js so the asar ships ONLY the .cjs bundles from the shell (the exact broken ESM main.js no longer ships next to the entry); renderer app/ui/dist .js retained."
review: "Independent code-reviewer (!= implementer): PASS, 0 Critical/High. Medium-1 (unbundled ESM tree still shipped) FIXED via asar exclusion. Low-3 (csp.test still whitelisted [::1]) FIXED — now asserts [::1] absent. Low-4 (stale main.js comment) FIXED. Low-2 (meta vs header ws:// divergence) is PRE-EXISTING + harmless today (renderer uses SSE-over-fetch) -> carry-forward."
