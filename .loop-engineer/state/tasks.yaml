    notes: "DONE 2026-07-11 (RUN-0007). All three Electron-scaffold-review GATES closed + progressive readiness + folded CGHC-015/017 carry-forwards. GATE 1: renderer served over a registered secure/standard app://cowork protocol (not file://); createAppProtocolHandler attaches the full RENDERER_CSP as a real response header on EVERY response (200/asset/403/404) + path-traversal guard (single-decode+normalize+startsWith(root+sep); survived %2e%2e/double-encode/%5c/drive-abs/UNC/sibling-prefix/NUL). CSP forbids unsafe-inline/eval, connect-src loopback-only, object-src/base-uri/frame-src/frame-ancestors/form-action locked. GATE 2: boundary envelope (protocol tag cghc.boundary.v1, SuccessEnvelope/ErrorEnvelope/ResponseEnvelope, HealthData, SERVICE_NAME, BoundaryErrorCode) lifted into core/contracts/src/boundary-envelope.ts; service/boundary re-exports (names stable); app/ui deleted its drifted copy, imports from contracts, and RE-INSTATED the protocol-version rejection (also applied to the EV snapshot unwrap). GATE 3: real webPreferences (sandbox/contextIsolation true, nodeIntegration false, webSecurity true), preload exposes exactly getBootstrap+pickWorkspaceFolder (no ipcRenderer/require), 4 navigation denials + look-alike-origin-proof isSameOrigin; 23 app/shell security-baseline tests (were 0). Progressive readiness: honest starting->connecting->ready state machine (ready ONLY on a real health() success), unreachable/not_connected with Retry + scrubbed diagnostics, bounded backoff, never fake-ready, no token/base-url in DOM. Folded: EV5 progress render (SessionView.progress + progressbar, terminal clears it), MEDIUM-5 append-delta + rAF coalescer (no O(N^2)), permission-poll visibility gating + aria-describedby, service-client split (<250). INDEPENDENT security review (security-reviewer != implementer): PASS, 0 Critical/High; MEDIUM (protocol-check test gap) + 2 LOW (snapshot protocol guard, scrub 2 error paths) ALL FIXED. Full suite 500 pass, tsc clean, source <250