# Cowork GHC — Canonical Loop Definitions
# Loops are checkpoints/migrations, NOT periodic cron. A COMPLETED+PASS loop with
# unchanged inputs is SKIPPED_ALREADY_VALID, never re-run without cause.

version: 1

loop_status_values: [NOT_READY, READY, RUNNING, BLOCKED, REVIEW_REQUIRED, VERIFY_REQUIRED, COMPLETED, STALE, FAILED]
task_status_values: [BACKLOG, READY, IN_PROGRESS, BLOCKED, REVIEW, VERIFY, DONE, STALE, FAILED]

rerun_allowed_when:
  - "User passes --force."
  - "A relevant input changed (fingerprint mismatch)."
  - "Output missing or corrupt."
  - "Prior gate did not pass."
  - "A downstream loop found a wrong assumption."
  - "Reference branch/commit changed."
  - "A critical dependency changed."
  - "Cowork GHC requirement/scope changed."
  - "Loop invalidated with a reason."

loops:
  - id: L0
    name: Bootstrap
    goal: "Scaffold the Agent-led system, controller, state, and Windows scripts. No feature code."
    depends_on: []
    produces:
      - .agent-workflow/
      - CLAUDE.md
      - AGENTS.md
      - .claude/agents/
      - .claude/rules/
      - .claude/skills/loop-engineer/SKILL.md
      - tools/loop-engineer/
      - .loop-engineer/state/
      - scripts/
    gate:
      - "Required files exist; YAML/JSON valid."
      - "Controller runs; controller tests pass."
      - "Claude adapters valid to the extent checkable."
      - "Four .bat files exist, self-locate project root, honest exit codes."
      - "No overwrite of existing files without safe merge; no reference-source edits."
      - "clean.bat does not delete source/git/docs/state/workspace/secrets."
      - "If runtime not implemented, start/stop honestly report NOT_READY (no fake success)."

  - id: L1
    name: Requirement Baseline
    goal: "Review OpenWork doc, build capability matrix, define Cowork GHC scope + acceptance."
    depends_on: [L0]
    produces:
      - .loop-engineer/reports/requirements-baseline-review.md
      - docs/product/cowork-ghc-scope-and-acceptance.md

  - id: L2
    name: Discovery
    goal: "Investigate this repo, OpenWork, OpenCode/runtime candidates, providers, desktop stack, Windows/process/license."
    depends_on: [L1]

  - id: L3
    name: Architecture Candidates
    goal: "Compare fork/reuse vs own-shell-on-runtime vs own-with-selective-reuse. Draft ADRs. No feature code."
    depends_on: [L2]
    produces:
      - docs/architecture/cowork-ghc-implementation-design.md
      - docs/architecture/decisions/

  - id: L4
    name: Architecture Review
    goal: "Independent critique from runtime, frontend, test, security, UX reviewers. Freeze architecture."
    depends_on: [L3]

  - id: L5
    name: Master Plan
    goal: "Vertical slices, task graph, owners/reviewers, acceptance, tests, evidence, risk, release, perf budget, script tasks."
    depends_on: [L4]

  - id: L6
    name: Implementation
    goal: "Execute per task/slice. Each task: deps -> implement -> test -> review -> fix -> verify -> evidence -> state."
    depends_on: [L5]
    execution_note: "Never run as one giant task. Use `task <id>` or `slice <id>`."

  - id: L7
    name: Integration
    goal: "Integrate slices; contract/integration/E2E/regression; persistence/reconnect; init/start/stop/clean checks."
    depends_on: [L6]

  - id: L8
    name: Hardening
    goal: "Negative paths, Windows edge cases, security review, performance, script edge cases (double-run, spaces, Unicode, admin)."
    depends_on: [L7]

  - id: L9
    name: Release Verification
    goal: "Production build, desktop packaging, clean-profile run, packaged smoke, lifecycle, final report. Dev server is not final evidence."
    depends_on: [L8]

  - id: L10
    name: Retrospective and Integration Readiness
    goal: "Summarize, known limits, tech debt, deferred capability, integration plans (dispatch/MS/knowledge/gateway), next round."
    depends_on: [L9]
