name: ONNX Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/Backend/internal/llm/**'
      - 'src/Backend/tests/**'
      - 'src/docker/**'
      - 'src/docker-compose*.yml'
      - '.github/workflows/onnx-integration.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/Backend/internal/llm/**'
      - 'src/Backend/tests/**'
      - 'src/docker/**'
      - 'src/docker-compose*.yml'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Run Go unit tests
      working-directory: src/Backend
      run: |
        go test ./internal/llm/... -short -v -timeout 60s

  onnx-tests:
    runs-on: ubuntu-latest
    name: ONNX Integration Tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc g++ musl-dev

    - name: Download ONNX Runtime
      run: |
        wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.30.1/onnxruntime-linux-x64-1.30.1.tgz
        tar xzf onnxruntime-linux-x64-1.30.1.tgz
        sudo mv onnxruntime-linux-x64-1.30.1 /opt/onnxruntime
        echo "ONNXRUNTIME_ROOT=/opt/onnxruntime" >> $GITHUB_ENV
        echo "CGO_CFLAGS=-I/opt/onnxruntime/include" >> $GITHUB_ENV
        echo "CGO_LDFLAGS=-L/opt/onnxruntime/lib -lonnxruntime" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=/opt/onnxruntime/lib" >> $GITHUB_ENV
        sudo ldconfig /opt/onnxruntime/lib

    - name: Run ONNX embedder tests
      working-directory: src/Backend
      run: go test ./internal/llm/onnx_embedder_test.go -tags=onnx -v -timeout 60s

    - name: Run ONNX integration tests
      working-directory: src/Backend
      run: go test ./tests/integration/onnx_integration_test.go -tags="integration,onnx" -v -timeout 120s

  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      working-directory: src
      run: docker-compose -f docker-compose.onprem.yml build

    - name: Validate image
      run: |
        docker images | grep rad-server
        echo "✓ Docker image built successfully"

  docker-e2e:
    runs-on: ubuntu-latest
    name: Docker E2E Tests
    needs: docker-build

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      working-directory: src
      run: docker-compose -f docker-compose.onprem.yml build

    - name: Start services
      working-directory: src
      run: docker-compose -f docker-compose.onprem.yml up -d

    - name: Wait for services
      run: sleep 60

    - name: Test API health
      run: |
        curl -f http://localhost:8080/api/v1/onprem/status || exit 1
        echo "✓ API health check passed"

    - name: Test embedding generation
      run: |
        RESPONSE=$(curl -s -X POST http://localhost:8080/api/v1/embed \
          -H "Content-Type: application/json" \
          -d '{"texts":["test"]}')
        echo "$RESPONSE" | grep -q "embeddings" || (echo "✗ Embedding test failed"; exit 1)
        echo "✓ Embedding generation passed"

    - name: Collect logs
      if: always()
      working-directory: src
      run: docker-compose -f docker-compose.onprem.yml logs rad-server | tail -50

    - name: Cleanup
      if: always()
      working-directory: src
      run: docker-compose -f docker-compose.onprem.yml down -v

  lint:
    runs-on: ubuntu-latest
    name: Code Quality Checks

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Run gofmt
      working-directory: src/Backend
      run: |
        if [ -n "$(gofmt -l ./internal/llm/)" ]; then
          echo "✗ Code formatting issues found"
          gofmt -d ./internal/llm/
          exit 1
        fi
        echo "✓ Code formatting check passed"

    - name: Run go vet
      working-directory: src/Backend
      run: go vet ./internal/llm/...

    - name: Run go mod tidy check
      working-directory: src/Backend
      run: |
        go mod tidy
        if [ -n "$(git diff --name-only)" ]; then
          echo "✗ go.mod or go.sum has uncommitted changes"
          git diff
          exit 1
        fi
        echo "✓ go.mod/go.sum check passed"
