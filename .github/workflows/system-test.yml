name: System Test (M365KG real-stack integration)

# REQ-205 Phase 3 (T3.1-T3.4): runs the REAL M365 Knowledge Graph stack.
# PostgreSQL and Neo4j run as Docker containers via docker-compose.yml (same
# images and credentials used in local dev). The Go backend and Rust llm-svc
# run as real host processes — no containers for them.
#
# SYSTEM_TEST_USE_DOCKER=1 tells run.sh to skip its pg_ctl/neo4j binary
# lifecycle; Docker owns those two services for the duration of this job.
# A cypher-shell shim routes T3.2's seed calls through `docker compose exec`.
# See E2E_TESTING_GUIDE.md.

on:
  push:
    branches: [main, develop]
    paths:
      - "app/backend/**"
      - "app/llm-svc/**"
      - "service/src/knowledge/**"
      - "service/tests/knowledge/**"
      - "scripts/system-test/**"
      - ".github/workflows/system-test.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "app/backend/**"
      - "app/llm-svc/**"
      - "service/src/knowledge/**"
      - "service/tests/knowledge/**"
      - "scripts/system-test/**"
      - ".github/workflows/system-test.yml"
  workflow_dispatch:

jobs:
  m365kg-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Signals run.sh to skip pg_ctl/initdb/neo4j binary lifecycle —
      # Docker Compose owns PostgreSQL and Neo4j for this job.
      SYSTEM_TEST_USE_DOCKER: "1"
      # Shared connection env — backend, migrations, and Cowork-side tests
      # all read these same variables.
      DATABASE_URL: "postgres://m365kg:m365kg_dev_password@localhost:5432/m365kg?sslmode=disable"
      NEO4J_URI: "bolt://localhost:7687"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "m365kg_dev_password"
      JWT_SECRET: "dev-secret"
      DEV_LOGIN_USERNAME: "dev"
      DEV_LOGIN_PASSWORD: "dev-password"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/backend/go.mod

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install build tools and PostgreSQL client
        run: |
          sudo apt-get update
          # protoc: required by llm-svc tonic-build at compile time
          # postgresql-client: gives psql/createdb for migrations — no server installed
          sudo apt-get install -y protobuf-compiler postgresql-client

      - name: Start PostgreSQL and Neo4j (Docker Compose)
        run: docker compose up -d postgres neo4j

      - name: Wait for PostgreSQL to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U m365kg -d m365kg && break
            sleep 2
          done
          # Fail the step clearly if still not ready after 60 s
          docker compose exec -T postgres pg_isready -U m365kg -d m365kg

      - name: Wait for Neo4j to be ready
        run: |
          echo "Waiting for Neo4j HTTP on :7474..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:7474 && break
            sleep 3
          done
          curl -sf http://localhost:7474

      - name: Install cypher-shell shim (routes to Docker container)
        # run.sh calls `cypher-shell` for T3.2 fixture seeding. Docker owns
        # Neo4j, so we install a thin wrapper that forwards the call via
        # `docker compose exec`. No need to install the Neo4j apt package.
        run: |
          cat << 'EOF' | sudo tee /usr/local/bin/cypher-shell > /dev/null
          #!/usr/bin/env bash
          exec docker compose -f "$GITHUB_WORKSPACE/docker-compose.yml" \
            exec -T neo4j cypher-shell "$@"
          EOF
          sudo chmod +x /usr/local/bin/cypher-shell

      - name: Cache cargo registry/build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            app/llm-svc/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/llm-svc/Cargo.lock') }}

      - name: Install Node dependencies
        run: npm ci

      - name: Run the real M365KG system-test environment
        run: ./scripts/system-test/run.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== PostgreSQL logs ==="
          docker compose logs --no-color postgres 2>/dev/null || true
          echo "=== Neo4j logs ==="
          docker compose logs --no-color neo4j 2>/dev/null || true

      - name: Stop Docker services
        if: always()
        run: docker compose down -v
