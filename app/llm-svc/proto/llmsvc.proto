syntax = "proto3";

package llmsvc;

option go_package = "github.com/rad-system/m365-knowledge-graph/internal/llmsvc";
option csharp_namespace = "LlmSvc";
option java_multiple_files = true;
option java_package = "com.fpt.llmsvc";

// LlmSvc is the unified gRPC service for all LLM-related computation:
// embedding, reranking, entity/relationship extraction (NER),
// context compression, intent detection, and answer generation.
// Go backend (m365-knowledge-graph) never makes direct LLM provider calls;
// all LLM operations route through this gRPC service.
service LlmSvc {
  // Embed generates embeddings for a batch of texts.
  rpc Embed(EmbedRequest) returns (EmbedResponse);

  // Rerank scores a set of documents/chunks against a query.
  rpc Rerank(RerankRequest) returns (RerankResponse);

  // ExtractEntities performs NLP entity and relationship extraction.
  // Used both at ingestion time (extracting from document chunks)
  // and at query time (extracting entities from the user's question).
  rpc ExtractEntities(ExtractRequest) returns (ExtractResponse);

  // Compress reduces context size using map-reduce or abstractive summarization.
  // Called at retrieval Stage 6 if packed context exceeds token budget.
  rpc Compress(CompressRequest) returns (CompressResponse);

  // DetectIntent classifies the user's intent (find_expert, find_document, etc.).
  // Called at retrieval Stage 1.
  rpc DetectIntent(IntentRequest) returns (IntentResponse);

  // Generate produces an answer to a user query.
  // Called at retrieval Stage 7; may route to local model or cloud proxy per NLP_MODE.
  rpc Generate(GenerateRequest) returns (GenerateResponse);

  // Health checks the service's liveness.
  rpc Health(HealthRequest) returns (HealthResponse);

  // ListModels returns available embedding and generative models.
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
}

// ============================================================================
// Embed RPC
// ============================================================================

message EmbedRequest {
  // texts: list of text snippets to embed (e.g., document chunks, search queries)
  repeated string texts = 1;

  // model_name: embedding model identifier (e.g., "text-embedding-3-small", "e5-large-v2")
  // If empty, service uses default embedding model configured in models.yaml
  string model_name = 2;

  // task_type: semantic task hint (optional, for multi-task models):
  // "search_document", "search_query", "classify", "clustering"
  string task_type = 3;
}

message EmbedResponse {
  // embeddings: one embedding (as float32 array, serialized as bytes) per input text
  repeated bytes embeddings = 1;

  // model_name: echo back the model used
  string model_name = 2;

  // dimensions: vector dimensionality (e.g., 384, 1536)
  int32 dimensions = 3;

  // error: populated if the request failed (e.g., invalid model, service error)
  string error = 4;
}

// ============================================================================
// Rerank RPC
// ============================================================================

message RerankRequest {
  // query: the reference query text (user's question or intent)
  string query = 1;

  // documents: candidate documents/chunks to score against the query
  repeated RerankDocument documents = 2;

  // model_name: reranking model (e.g., "bge-reranker-base", "ms-marco-minilm-l-12-v2")
  // If empty, service uses default reranker configured in models.yaml
  string model_name = 3;

  // top_k: optional, limit output to top-k results (0 = all)
  int32 top_k = 4;
}

message RerankDocument {
  // doc_id: unique identifier for this document (e.g., chunk ID, entity ID)
  string doc_id = 1;

  // text: document/chunk content to score
  string text = 2;

  // metadata: optional JSON-encoded metadata for logging/debugging
  string metadata = 3;
}

message RerankResponse {
  // results: scored documents, sorted by score descending
  repeated RerankResult results = 1;

  // model_name: echo back the model used
  string model_name = 2;

  // error: populated if the request failed
  string error = 3;
}

message RerankResult {
  // doc_id: from RerankDocument
  string doc_id = 1;

  // score: relevance score (typically 0.0–1.0, higher = more relevant)
  float score = 2;

  // rank: result rank (1-indexed, after sorting)
  int32 rank = 3;
}

// ============================================================================
// ExtractEntities RPC (NER)
// ============================================================================

message ExtractRequest {
  // text: input text to extract entities and relationships from
  string text = 1;

  // task_mode: "ingestion" (extract from document) or "query" (extract from user question)
  // Affects the extraction prompts and entity types considered
  string task_mode = 2;

  // model_name: LLM model for extraction
  // If empty, service uses default configured model (per NLP_MODE)
  string model_name = 3;

  // schema: optional JSON schema for entity types / relationship types to extract
  // If empty, uses a default business-domain schema (Person, Project, Document, Technology, etc.)
  string schema = 4;

  // include_relationships: if true, also extract relationships between entities
  bool include_relationships = 5;

  // task_type: Brain task-tagging hint (e.g., "nlp_extraction", "query_ner")
  // used by llm-svc's routing.rs to decide local vs. cloud per NLP_MODE
  string task_type = 6;
}

message Entity {
  // name: entity text
  string name = 1;

  // type: entity type (e.g., "Person", "Project", "Technology")
  string type = 2;

  // confidence: confidence score 0.0–1.0
  float confidence = 3;

  // metadata: optional JSON metadata (e.g., span offsets, attributes)
  string metadata = 4;
}

message Relationship {
  // from_entity: source entity identifier or text
  string from_entity = 1;

  // relationship_type: e.g., "works_on", "manages", "uses"
  string relationship_type = 2;

  // to_entity: target entity identifier or text
  string to_entity = 3;

  // confidence: confidence 0.0–1.0
  float confidence = 4;

  // metadata: optional JSON metadata
  string metadata = 5;
}

message ExtractResponse {
  // entities: extracted entities
  repeated Entity entities = 1;

  // relationships: extracted relationships
  repeated Relationship relationships = 2;

  // model_name: echo back the model used
  string model_name = 3;

  // error: populated if extraction failed
  string error = 4;
}

// ============================================================================
// Compress RPC
// ============================================================================

message CompressRequest {
  // context: full context (assembled from retrieval Stage 5)
  // that may exceed token budget
  string context = 1;

  // target_tokens: desired max token count after compression (e.g., 8000)
  int32 target_tokens = 2;

  // method: compression strategy
  // "map_reduce" = split into chunks, summarize each, join summaries
  // "abstractive" = LLM-based abstractive summarization
  // "extract" = extractive summarization (keep top sentences)
  string method = 3;

  // query: optional query hint to bias compression
  string query = 4;

  // model_name: LLM for compression (only used if method="abstractive")
  string model_name = 5;

  // task_type: Brain task-tagging hint (e.g., "context_compression")
  // used by llm-svc's routing.rs to decide local vs. cloud per NLP_MODE
  string task_type = 6;
}

message CompressResponse {
  // compressed_context: compressed context string
  string compressed_context = 1;

  // original_tokens: estimated token count of input
  int32 original_tokens = 2;

  // compressed_tokens: estimated token count of output
  int32 compressed_tokens = 3;

  // compression_ratio: compressed_tokens / original_tokens
  float compression_ratio = 4;

  // error: populated if compression failed
  string error = 5;
}

// ============================================================================
// DetectIntent RPC
// ============================================================================

message IntentRequest {
  // query: user's natural language question
  string query = 1;

  // model_name: optional model override
  string model_name = 2;

  // context: optional context to help intent classification
  string context = 3;

  // task_type: Brain task-tagging hint (e.g., "intent_detection")
  // used by llm-svc's routing.rs to decide local vs. cloud per NLP_MODE
  string task_type = 4;
}

message IntentResponse {
  // intent: detected intent type
  // Examples: "find_expert", "find_document", "find_project_info",
  // "find_technology_usage", "general_question"
  string intent = 1;

  // confidence: confidence 0.0–1.0
  float confidence = 2;

  // attributes: optional JSON map of extracted intent attributes
  // (e.g., {"entity_type": "person", "action": "find"})
  string attributes = 3;

  // error: populated if intent detection failed
  string error = 4;
}

// ============================================================================
// Generate RPC
// ============================================================================

message GenerateRequest {
  // query: user's original question
  string query = 1;

  // context: assembled, compressed context from retrieval Stage 6
  string context = 2;

  // instructions: optional system prompt / generation instructions
  string instructions = 3;

  // temperature: LLM sampling parameter (0.0–2.0, default 0.7)
  float temperature = 4;

  // max_tokens: max output length in tokens (default 2048)
  int32 max_tokens = 5;

  // model_name: optional model override
  string model_name = 6;

  // include_citations: if true, answer includes source citations
  bool include_citations = 7;

  // task_type: Brain task-tagging hint (e.g., "answer_generation")
  // used by llm-svc's routing.rs to decide local vs. cloud per NLP_MODE
  string task_type = 8;
}

message GenerateResponse {
  // answer: generated answer text
  string answer = 1;

  // citations: list of cited sources (chunk IDs, document names, URLs)
  repeated string citations = 2;

  // model_name: echo back the model used
  string model_name = 3;

  // tokens_used: estimated token count of the generated answer
  int32 tokens_used = 4;

  // latency_ms: service-side processing time in milliseconds
  int32 latency_ms = 5;

  // error: populated if generation failed
  string error = 6;
}

// ============================================================================
// Health RPC
// ============================================================================

message HealthRequest {
  // service: optional service name to check health of (e.g., "llmsvc.LlmSvc")
  // If empty, checks overall service health
  string service = 1;
}

message HealthResponse {
  // status: health status ("SERVING", "NOT_SERVING", "UNKNOWN", "SERVICE_UNKNOWN")
  string status = 1;

  // message: optional human-readable details
  string message = 2;

  // checks: detailed status of sub-components
  map<string, string> checks = 3;
}

// ============================================================================
// ListModels RPC
// ============================================================================

message ListModelsRequest {
  // model_kind: optional filter by kind ("embedding", "reranker", "generative")
  // If empty, returns all models
  string model_kind = 1;
}

message ListModelsResponse {
  // models: list of available models
  repeated ModelInfo models = 1;

  // error: populated if listing failed
  string error = 2;
}

message ModelInfo {
  // name: model identifier (e.g., "text-embedding-3-small", "qwen3-8b-q4")
  string name = 1;

  // kind: model category ("embedding", "reranker", "generative", "other")
  string kind = 2;

  // format: model format ("onnx", "gguf", "safetensors", "cloud")
  string format = 3;

  // dimensions: for embedding models, vector dimensionality (0 for generative)
  int32 dimensions = 4;

  // version: model version or revision
  string version = 5;

  // is_local: true if model is served locally in-process by llm-svc
  bool is_local = 6;

  // is_default: true if this is the default model for its kind
  bool is_default = 7;

  // metadata: optional JSON-encoded additional metadata
  string metadata = 8;
}
