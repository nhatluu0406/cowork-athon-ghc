# electron-builder packaging config for Cowork GHC (CGHC-028 Wave B2b).
#
# RUN FROM THE REPO ROOT (projectDir = repo root), e.g. `electron-builder --win --config
# app/shell/electron-builder.yml`. All `files` / `directories.output` globs below are therefore
# RELATIVE TO THE REPO ROOT, not to this file. `electronVersion` is read from the root
# package.json `devDependencies.electron`. The packaged app entry is the root package.json
# `main` field (`app\shell\dist\main.cjs`) — a `.cjs` esbuild bundle (CommonJS). The
# backslash form is intentional on Windows: electron-builder's asar stores Windows-style paths,
# and the Windows asar reader resolves `app\shell\dist\main.cjs`.
#
# `extraMetadata.main` is deliberately NOT used: injecting it makes electron-builder rewrite the
# source root package.json in place (stripping `scripts`, adding `main`) and the async restore is
# unreliable under `--dir`, which corrupts the working tree. Setting `main` directly in the source
# manifest gives electron-builder nothing to inject, so it never mutates the checked-in package.json.
#
# Wave C runs the actual `electron-builder` to produce the installer/portable + a packaged smoke
# test. This file only DECLARES the packaging contract; it is validated by a config parse here.
#
# ADR 0010 (M365KG stack bundling) — `llm-svc` (Rust gRPC service), the Go backend
# (`m365-knowledge-graph`), PostgreSQL, Neo4j, and the Temurin JRE are all bundled in the installer
# via `extraResources` below, enabling offline-first deployment without requiring downloads at runtime
# (vendor ZIP files must be pre-downloaded to `vendor/` before build). Migration files and model
# configs ship with the app (see `app/backend/migrations` and `app/llm-svc/models.yaml`).
appId: com.coworkghc.desktop
productName: Cowork GHC
copyright: Copyright (c) 2026 Cowork GHC

directories:
  # Packaged artifacts land at repo-root/dist-app (kept out of any workspace dist/).
  output: dist-app

asar: true
# The native keyring addon MUST be unpacked from the asar archive: a `.node` addon cannot be
# loaded from inside asar. `@napi-rs/keyring` loads its platform binding from the sibling
# `@napi-rs/keyring-win32-x64-msvc` package, so BOTH are unpacked. (The OpenCode binary is NOT
# in the asar at all — it ships via `extraResources` below.)
asarUnpack:
  - "**/node_modules/@napi-rs/keyring/**"
  - "**/node_modules/@napi-rs/keyring-win32-x64-msvc/**"

# The Electron main is a SINGLE esbuild bundle (`app/shell/dist/main.cjs`) that INLINES every
# `@cowork-ghc/*` workspace module + all pure-JS deps. The `tsc -b` step also emits the loose,
# unbundled ESM shell tree (`main.js`, `preload.js`, `create-window.js`, `security/*.js`, ...)
# next to the bundles; those `.js` files are NEVER the runtime entry and are EXPLICITLY excluded
# below (`!app/shell/dist/**/*.js`) so the asar ships ONLY the `.cjs` bundles from the shell. This
# also removes the exact ESM `main.js` whose top-level `require` threw `ReferenceError: require is
# not defined in ES module scope` — keeping it out of the artifact prevents a silent regression if
# the entry is ever mis-pointed. Only the bundled main + preload (`.cjs`), the renderer (`app/ui/
# dist`, whose own `.js` are Vite output and MUST stay), the root-hoisted native keyring, and the
# manifests go into the asar. Sourcemaps/TS/build metadata are excluded.
files:
  - "app/shell/dist/**"
  - "app/ui/dist/**"
  - "node_modules/@napi-rs/keyring/**"
  - "node_modules/@napi-rs/keyring-win32-x64-msvc/**"
  - "package.json"
  - "app/shell/package.json"
  - "!app/shell/dist/**/*.js"
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/*.tsbuildinfo"
  - "!**/tsconfig*.json"

# External resources (binaries, config) are spawned as child processes from disk, so they ship
# OUTSIDE the asar via extraResources → `<resourcesPath>/path`. The packaged shell resolves them
# from `process.resourcesPath` (see packaged-paths.ts).
extraResources:
  - from: "node_modules/opencode-ai/bin/opencode.exe"
    to: "opencode/opencode.exe"
  - from: "skills/builtin"
    to: "skills"
  # M365KG stack migrations (ADR 0010) — small (a few KB of `.sql`/`.cypher` text), shipped with
  # the app itself (not downloaded). `M365KGStackInitializer` reads them from
  # `<resourcesPath>/m365kg-migrations` in a packaged build (see `m365kg-stack-paths.ts`).
  - from: "app/backend/migrations"
    to: "m365kg-migrations"
  # llm-svc: Rust gRPC service binary and model configuration (bundled with app).
  # Spawned as child process from `<resourcesPath>/llm-svc/llm-svc.exe`.
  # See `app/llm-svc/` for source and `app/llm-svc/models.yaml` for model config.
  - from: "app/llm-svc/target/release/llm-svc.exe"
    to: "llm-svc/llm-svc.exe"
  - from: "app/llm-svc/models.yaml"
    to: "llm-svc/models.yaml"
  # app/backend: Go backend binary (bundled with app).
  # Spawned as child process from `<resourcesPath>/m365kg-backend/m365-knowledge-graph.exe`.
  # See `app/backend/cmd/main.go` for source.
  - from: "app/backend/bin/m365-knowledge-graph.exe"
    to: "m365kg-backend/m365-knowledge-graph.exe"
  # M365KG stack vendor ZIPs (offline-first bundling per ADR 0010) — binaries downloaded from
  # official sources and pre-downloaded to `vendor/` directory before build. These ship with the
  # installer, enabling offline deployment. See provisioning.ts for download URLs and verification.
  # NOTE: `vendor/` is .gitignore'd (large binaries); CI/CD or release builds must pre-populate
  # these files. On first run, `M365KGStackInitializer` extracts them under `<userData>/m365kg-stack/`.
  - from: "vendor/postgresql-16.14-windows-x64-binaries.zip"
    to: "m365kg-vendor/postgresql.zip"
  - from: "vendor/neo4j-community-5.26.28-windows.zip"
    to: "m365kg-vendor/neo4j.zip"
  - from: "vendor/jre-21-windows-x64.zip"
    to: "m365kg-vendor/jre.zip"

# Windows only; no code-signing (no certificate available). electron-builder skips signing
# cleanly when no cert env/opts are present; these flags make that explicit and non-fatal.
win:
  target:
    - nsis
    - portable
  signAndEditExecutable: false
forceCodeSigning: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: "${productName}-${version}-setup.${ext}"

portable:
  artifactName: "${productName}-${version}-portable.${ext}"
