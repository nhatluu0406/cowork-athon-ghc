<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <!--
      Defense-in-depth CSP (the authoritative one is the response header set by the
      shell in app/shell/src/security/csp.ts). frame-ancestors/form-action are enforced
      by the header, not by a meta tag.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' http://127.0.0.1:* http://localhost:*; object-src 'none'; base-uri 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cowork GHC</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <link rel="stylesheet" href="./src/shell-layout.css" />
    <link rel="stylesheet" href="./src/ui-shell/shell-frame.css" />
    <link rel="stylesheet" href="./src/ui-shell/context-sidebar.css" />
    <link rel="stylesheet" href="./src/ui-shell/microsoft/microsoft.css" />
  </head>
  <body>
    <main id="app" aria-live="polite"></main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
