version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: m365kg-postgres
    environment:
      POSTGRES_USER: m365kg
      POSTGRES_PASSWORD: m365kg_dev_password
      POSTGRES_DB: m365kg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m365kg"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.11-community
    container_name: m365kg-neo4j
    environment:
      NEO4J_AUTH: neo4j/m365kg_dev_password
      NEO4J_dbms_memory_heap_initial__size: 1G
      NEO4J_dbms_memory_heap_max__size: 2G
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
