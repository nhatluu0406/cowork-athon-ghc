schema_version: "1.0"

extension:
  id: context-pack
  name: "Context Assembler"
  version: "1.0.0"
  description: "Focused context builder for /implement — packs only ACs, design sections, and scoped code relevant to each task. Reduces token usage while increasing implementation quality."
  author: DungPD4
  license: FPT-Proprietary

requires:
  speckit_version: ">=0.2.0"
  tools:
    - name: python3
      required: true

provides:
  commands:
    - name: speckit.context-pack.run
      file: commands/speckit.context-pack.run.md
      description: "Assemble focused context for a specific task before implementation"
    - name: speckit.context-pack.dry-run
      file: commands/speckit.context-pack.dry-run.md
      description: "Show token estimate for a task context without writing output file"

hooks:
  before_implement:
    command: speckit.context-pack.run
    optional: true
    prompt: "Assemble focused context for this task before implementing?"
    description: "Run context-assembler to pack relevant ACs, design, and code scope"

tags:
  - "context"
  - "token-reduction"
  - "rag"
  - "implement"
